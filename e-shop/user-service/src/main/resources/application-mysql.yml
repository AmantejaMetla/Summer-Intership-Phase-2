# SQL linkage: user-service → single DB eshop (run init-db/01-single-database-all-tables.sql, then start with profile mysql)
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/eshop
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

support:
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:none}
    support-number: ${WHATSAPP_SUPPORT_NUMBER:}
    meta:
      phone-number-id: ${META_WA_PHONE_NUMBER_ID:}
      access-token: ${META_WA_ACCESS_TOKEN:}
