# Default: H2 in-memory. Use profile "mysql" when MySQL is available.
server:
  port: 9082

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:user_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

support:
  whatsapp:
    provider: ${WHATSAPP_PROVIDER:none}
    support-number: ${WHATSAPP_SUPPORT_NUMBER:}
    meta:
      phone-number-id: ${META_WA_PHONE_NUMBER_ID:}
      access-token: ${META_WA_ACCESS_TOKEN:}
